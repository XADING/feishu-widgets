<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水波球进度插件</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #f5f7fa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
  }
  .widget-container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #ffffff;
    border-radius: 12px;
    padding: 12px;
  }
  .widget-title {
    font-size: 14px; color: #666;
    margin-bottom: 8px; font-weight: 500;
  }
  .wave-ball-wrapper {
    position: relative;
    width: 140px; height: 140px;
  }
  canvas {
    display: block;
    width: 140px; height: 140px;
  }
  .percent-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px; font-weight: bold;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.15);
    pointer-events: none;
  }
  .sub-text {
    font-size: 12px; color: #999;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="widget-container">
  <div class="widget-title" id="title">今日达成</div>
  <div class="wave-ball-wrapper">
    <canvas id="waveCanvas" width="280" height="280"></canvas>
    <div class="percent-text" id="percentText">88%</div>
  </div>
  <div class="sub-text" id="subText">目标完成率</div>
</div>

<script>
(function() {
  // 从 URL 参数读取配置
  const params = new URLSearchParams(window.location.search);
  const percent = parseFloat(params.get('percent')) || 88;
  const titleText = params.get('title') || '今日达成';
  const subText = params.get('sub') || '目标完成率';
  const primaryColor = params.get('color') || '#4CAF50';
  const bgColor = params.get('bg') || '#1565C0';

  document.getElementById('title').textContent = titleText;
  document.getElementById('subText').textContent = subText;
  document.getElementById('percentText').textContent = percent + '%';

  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 2;
  const size = 280;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  ctx.scale(dpr, dpr);

  const center = size / 2;
  const radius = size / 2 - 8;
  let phase = 0;

  // 解析颜色
  function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
      r: parseInt(result[1], 16),
      g: parseInt(result[2], 16),
      b: parseInt(result[3], 16)
    } : { r: 76, g: 175, b: 80 };
  }
  const rgb = hexToRgb(primaryColor);
  const bgRgb = hexToRgb(bgColor);

  // 气泡
  const bubbles = Array.from({length: 6}, () => ({
    x: Math.random() * size,
    y: center + radius,
    r: Math.random() * 2.5 + 1,
    speed: Math.random() * 0.4 + 0.2,
    opacity: Math.random() * 0.4 + 0.2
  }));

  function drawBall() {
    ctx.clearRect(0, 0, size, size);

    ctx.save();
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, Math.PI * 2);
    ctx.clip();

    // 背景渐变
    const bgGrad = ctx.createLinearGradient(0, 0, 0, size);
    bgGrad.addColorStop(0, `rgba(${bgRgb.r}, ${bgRgb.g}, ${bgRgb.b}, 0.95)`);
    bgGrad.addColorStop(1, `rgba(${Math.max(bgRgb.r-40,0)}, ${Math.max(bgRgb.g-40,0)}, ${Math.max(bgRgb.b-40,0)}, 0.98)`);
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, size, size);

    // 水位线
    const p = Math.max(0, Math.min(100, percent));
    const waterHeight = radius * 2 * (p / 100);
    const baseY = center + radius - waterHeight;

    // 后层波浪
    drawWave(baseY, 6, 0.018, phase, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.35)`);
    // 前层波浪
    drawWave(baseY + 4, 8, 0.022, phase + 1.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.55)`);

    // 气泡
    bubbles.forEach(b => {
      b.y -= b.speed;
      if (b.y < center - radius) {
        b.y = center + radius;
        b.x = Math.random() * size;
      }
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${b.opacity})`;
      ctx.fill();
    });

    ctx.restore();

    // 外圆发光边框
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.6)`;
    ctx.lineWidth = 3;
    ctx.stroke();

    // 外圈光晕
    ctx.beginPath();
    ctx.arc(center, center, radius + 3, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.15)`;
    ctx.lineWidth = 4;
    ctx.stroke();

    phase += 0.04;
    requestAnimationFrame(drawBall);
  }

  function drawWave(baseY, amplitude, frequency, phaseOffset, color) {
    ctx.beginPath();
    ctx.moveTo(0, size);
    for (let x = 0; x <= size; x += 2) {
      const y = baseY + Math.sin(x * frequency + phaseOffset) * amplitude;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(size, size);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  drawBall();
})();
</script>
</body>
</html>
